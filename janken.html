<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>じゃんけんゲーム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <style>
   body {
    text-align: center;
    font-family: sans-serif;
  }
  
  button {
    font-size: 24px;
    padding: 15px 25px;
    margin: 10px;
    width: 80%;
    max-width: 300px;
  }
</style>
</head>
<body>

  <h1>じゃんけんゲーム</h1>

  <button onclick="play('グー')">グー</button>
  <button onclick="play('チョキ')">チョキ</button>
  <button onclick="play('パー')">パー</button>

  <p id="result"></p>
  <p id="score"></p>
  <script>
    let win = 0;
    let lose = 0;
    let draw = 0;
    function play(user) {
      const choices = ['グー', 'チョキ', 'パー'];
      const computer = choices[Math.floor(Math.random() * 3)];

      let result = '';

     if (user === computer) {
  result = '引き分け';
  draw++;
} else if (
  (user === 'グー' && computer === 'チョキ') ||
  (user === 'チョキ' && computer === 'パー') ||
  (user === 'パー' && computer === 'グー')
) {
  result = '勝ち！';
  win++;
} else {
  result = '負け...';
  lose++;
}
      document.getElementById('result').innerText =
  `あなた：${user} / 相手：${computer} → ${result}`;

      document.getElementById('score').innerText =
  `勝ち:${win} 負け:${lose} 引き分け:${draw}`;
   
      document.body.style.backgroundColor = 
        result === '勝ち！' ? 'lightgreen' :
        result === '負け...' ? 'lightcoral' : 'white';
}
  </script>

</body>
</html>
